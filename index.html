<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puzzle Talk</title>
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- First-run welcome screen -->
<div id="screen-welcome" class="hidden">
  <div id="welcome-emoji">👋</div>
  <h1>Welcome to Puzzle Talk!</h1>
  <p id="welcome-text">A puzzle game you can play just by talking.</p>
  <button id="btn-welcome">Tap here to begin</button>
</div>

<!-- Start screen -->
<div id="screen-start">
  <h1>🧩 Puzzle Talk</h1>
  <p id="solved-count" class="hidden"></p>
  <p>Pick a puzzle to begin:</p>
  <button id="btn-easy" class="difficulty-btn">Easy
    <small>3 things to match — a gentle start</small></button>
  <button id="btn-medium" class="difficulty-btn">Medium
    <small>4 things to match — a nice challenge</small></button>
  <button id="btn-hard" class="difficulty-btn">Hard
    <small>5 of each — for puzzle experts!</small></button>
  <button id="btn-voice-pick">🔈 Tap to hear &amp; choose a voice</button>
</div>

<!-- Play screen -->
<div id="screen-play" class="hidden">
  <div id="puzzle-title"></div>
  <div id="message" aria-live="polite"></div>
  <ol id="clues"></ol>
  <div id="pager" class="hidden">
    <button id="btn-prev" aria-label="Previous grid">◀</button>
    <span id="page-label"></span>
    <button id="btn-next" aria-label="Next grid">▶</button>
  </div>
  <div id="grid"></div>
  <div id="actions">
    <div id="actions-main">
      <button id="btn-undo">↩ Undo</button>
      <button id="btn-talk" aria-label="Talk to me">🎤</button>
      <button id="btn-hint">💡 Hint</button>
    </div>
    <div id="actions-extra">
      <button id="btn-read">🔊 Read clues</button>
      <button id="btn-reveal">Tell me one answer</button>
      <button id="btn-quit">New puzzle</button>
      <button id="btn-help">❓ Help</button>
      <button id="btn-voice" aria-pressed="true">Voice: on</button>
    </div>
  </div>
</div>

<!-- Done screen -->
<div id="screen-done" class="hidden">
  <div id="done-emoji">🎉</div>
  <div id="done-text"></div>
  <div id="done-id"></div>
  <button id="btn-done-home">Play another puzzle</button>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
