<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puzzle Talk — Speech Test</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #fdf6e3;
    --blue: #1d4ed8;
    --red: #b91c1c;
    --green: #15803d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 1rem;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 1.25rem; /* ~20px */
    background: var(--paper);
    color: var(--ink);
    max-width: 40rem;
    margin-inline: auto;
  }
  h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
  section {
    border: 2px solid var(--ink);
    border-radius: 0.75rem;
    padding: 1rem;
    margin-bottom: 1rem;
    background: #fff;
  }
  h2 { font-size: 1.25rem; margin: 0 0 0.75rem; }
  button {
    font-size: 1.25rem;
    font-family: inherit;
    min-height: 44px;
    min-width: 44px;
    border-radius: 0.75rem;
    border: 2px solid var(--ink);
    background: #fff;
    color: var(--ink);
    padding: 0.5rem 1rem;
    cursor: pointer;
  }
  #talkBtn {
    display: block;
    width: 9rem;
    height: 9rem;
    margin: 0.5rem auto;
    border-radius: 50%;
    background: var(--blue);
    color: #fff;
    border: 4px solid var(--ink);
    font-size: 1.5rem;
    font-weight: bold;
  }
  #talkBtn.listening {
    background: var(--red);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 50% { transform: scale(1.05); } }
  #heard {
    min-height: 3.5rem;
    font-size: 1.5rem;
    font-weight: bold;
    padding: 0.5rem;
    border: 2px dashed var(--blue);
    border-radius: 0.5rem;
    background: #eef4ff;
  }
  .status { font-size: 1.1rem; margin-top: 0.5rem; }
  .ok { color: var(--green); font-weight: bold; }
  .bad { color: var(--red); font-weight: bold; }
  #log {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-break: break-word;
    background: #f3f3f3;
    border-radius: 0.5rem;
    padding: 0.5rem;
    max-height: 16rem;
    overflow-y: auto;
  }
</style>
</head>
<body>
<h1>🧩 Puzzle Talk — Speech Test</h1>
<p style="font-size:1.1rem">Milestone 0 device test. Run each test below, then note the results in the diagnostics panel.</p>

<section>
  <h2>1 · Speech recognition (push-to-talk)</h2>
  <p style="font-size:1.1rem">Tap the button, then say: <em>“Mary doesn’t have the cat.”</em></p>
  <button id="talkBtn">🎤 Talk</button>
  <div id="heard">(what I heard will appear here)</div>
  <div class="status" id="recStatus"></div>
</section>

<section>
  <h2>2 · Speech output</h2>
  <button id="speakBtn">🔊 Read a sample clue aloud</button>
  <div class="status" id="ttsStatus"></div>
</section>

<section>
  <h2>3 · Diagnostics</h2>
  <button id="copyBtn">Copy log</button>
  <div id="log"></div>
</section>

<script>
const logEl = document.getElementById('log');
function log(msg) {
  const line = new Date().toISOString().slice(11, 19) + '  ' + msg;
  logEl.textContent += line + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

// --- Environment report ---
const standalone = window.matchMedia('(display-mode: standalone)').matches
  || window.navigator.standalone === true;
log('UA: ' + navigator.userAgent);
log('Display mode: ' + (standalone ? 'STANDALONE (home-screen app)' : 'browser tab'));
log('HTTPS: ' + (location.protocol === 'https:' ? 'yes' : 'NO — mic will not work'));
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
log('SpeechRecognition available: ' + (SR ? 'yes' + (window.SpeechRecognition ? ' (unprefixed)' : ' (webkit prefix)') : 'NO'));
log('speechSynthesis available: ' + ('speechSynthesis' in window ? 'yes' : 'NO'));

// --- Recognition test ---
const talkBtn = document.getElementById('talkBtn');
const heardEl = document.getElementById('heard');
const recStatus = document.getElementById('recStatus');
let rec = null;
let listening = false;

if (!SR) {
  talkBtn.disabled = true;
  recStatus.innerHTML = '<span class="bad">✗ SpeechRecognition is not available on this device/browser.</span>';
}

talkBtn.addEventListener('click', () => {
  if (listening) { try { rec.stop(); } catch (e) {} return; }
  primeTTS(); // user gesture: also unlock audio output

  // Fresh instance per use — Safari instances can go stale.
  rec = new SR();
  rec.lang = 'en-US';
  rec.continuous = false;
  rec.interimResults = true;
  rec.maxAlternatives = 3;

  const t0 = Date.now();
  let finalText = '';

  rec.onstart = () => {
    listening = true;
    talkBtn.classList.add('listening');
    talkBtn.textContent = '👂 Listening…';
    heardEl.textContent = '…';
    log('recognition started');
  };
  rec.onresult = (e) => {
    let interim = '';
    for (const res of e.results) {
      if (res.isFinal) {
        finalText += res[0].transcript;
        log('FINAL: "' + res[0].transcript.trim() + '" (confidence ' +
            (res[0].confidence ? res[0].confidence.toFixed(2) : 'n/a') + ')');
        for (let i = 1; i < res.length; i++) {
          log('  alt' + i + ': "' + res[i].transcript.trim() + '"');
        }
      } else {
        interim += res[0].transcript;
      }
    }
    heardEl.textContent = (finalText || interim) || '…';
  };
  rec.onerror = (e) => {
    log('recognition ERROR: ' + e.error + (e.message ? ' — ' + e.message : ''));
    recStatus.innerHTML = '<span class="bad">✗ Error: ' + e.error + '</span>';
  };
  rec.onend = () => {
    listening = false;
    talkBtn.classList.remove('listening');
    talkBtn.textContent = '🎤 Talk';
    log('recognition ended after ' + ((Date.now() - t0) / 1000).toFixed(1) + 's');
    if (finalText.trim()) {
      recStatus.innerHTML = '<span class="ok">✓ Heard you.</span>';
    } else if (!recStatus.textContent.includes('Error')) {
      recStatus.innerHTML = '<span class="bad">✗ Ended without hearing anything.</span>';
    }
  };

  try {
    rec.start();
  } catch (err) {
    log('rec.start() threw: ' + err.message);
    recStatus.innerHTML = '<span class="bad">✗ Could not start: ' + err.message + '</span>';
  }
});

// --- Synthesis test ---
const speakBtn = document.getElementById('speakBtn');
const ttsStatus = document.getElementById('ttsStatus');
let primed = false;

function primeTTS() {
  if (primed || !('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0;
  speechSynthesis.speak(u);
  primed = true;
  log('TTS primed with silent utterance');
}

speakBtn.addEventListener('click', () => {
  if (!('speechSynthesis' in window)) {
    ttsStatus.innerHTML = '<span class="bad">✗ speechSynthesis not available.</span>';
    return;
  }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(
    'Clue three. The teacher does not own the dog, and Mary lives next to the person who drinks tea.');
  u.rate = 0.9;
  u.onstart = () => { log('TTS started (voice: ' + (u.voice ? u.voice.name : 'default') + ')'); };
  u.onend = () => {
    log('TTS finished');
    ttsStatus.innerHTML = '<span class="ok">✓ If you heard the clue clearly, this test passes.</span>';
  };
  u.onerror = (e) => {
    log('TTS ERROR: ' + e.error);
    ttsStatus.innerHTML = '<span class="bad">✗ Error: ' + e.error + '</span>';
  };
  speechSynthesis.speak(u);
  log('TTS speak() called; voices loaded: ' + speechSynthesis.getVoices().length);
});

// --- Copy log ---
document.getElementById('copyBtn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(logEl.textContent);
    log('(log copied to clipboard)');
  } catch (e) {
    log('clipboard copy failed: ' + e.message + ' — select and copy manually');
  }
});
</script>
</body>
</html>
